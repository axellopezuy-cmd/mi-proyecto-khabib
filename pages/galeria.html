    <main>
        <section class="galeria py-5">
            <div class="container">
                <!-- Carrusel Bootstrap -->
                <div id="galeriaCarousel" class="carousel slide" data-bs-ride="carousel">
                    <!-- Indicadores -->
                    <div class="carousel-indicators">
                        <button type="button" data-bs-target="#galeriaCarousel" data-bs-slide-to="0" class="active" aria-current="true" aria-label="Imagen 1"></button>
                        <button type="button" data-bs-target="#galeriaCarousel" data-bs-slide-to="1" aria-label="Imagen 2"></button>
                        <button type="button" data-bs-target="#galeriaCarousel" data-bs-slide-to="2" aria-label="Imagen 3"></button>
                        <button type="button" data-bs-target="#galeriaCarousel" data-bs-slide-to="3" aria-label="Imagen 4"></button>
                        <button type="button" data-bs-target="#galeriaCarousel" data-bs-slide-to="4" aria-label="Imagen 5"></button>
                        <button type="button" data-bs-target="#galeriaCarousel" data-bs-slide-to="5" aria-label="Imagen 6"></button>
                    </div>
                    <!-- Slides -->
                    <div class="carousel-inner rounded">
                        <div class="carousel-item active">
                            <img src="../assets/img/combate.jpg" class="d-block w-100 carousel-img" alt="Khabib en combate">
                        </div>
                        <div class="carousel-item">
                            <img src="../assets/img/entrenando.jpg" class="d-block w-100 carousel-img" alt="Khabib entrenando">
                        </div>
                        <div class="carousel-item">
                            <img src="../assets/img/aka-team.jpg" class="d-block w-100 carousel-img" alt="Khabib con su equipo AKA">
                        </div>
                        <div class="carousel-item">
                            <img src="../assets/img/khabib-image-1.jpg" class="d-block w-100 carousel-img" alt="Khabib Nurmagomedov">
                        </div>
                        <div class="carousel-item">
                            <img src="../assets/img/conferencia.jpg" class="d-block w-100 carousel-img" alt="Khabib en conferencia de prensa">
                        </div>
                        <div class="carousel-item">
                            <img src="../assets/img/entrenamiento-w.jpg" class="d-block w-100 carousel-img" alt="Khabib durante entrenamiento">
                        </div>
                    </div>
                    <!-- Controles -->
                    <button class="carousel-control-prev" type="button" data-bs-target="#galeriaCarousel" data-bs-slide="prev">
                        <span class="carousel-control-prev-icon" aria-hidden="true"></span>
                        <span class="visually-hidden">Anterior</span>
                    </button>
                    <button class="carousel-control-next" type="button" data-bs-target="#galeriaCarousel" data-bs-slide="next">
                        <span class="carousel-control-next-icon" aria-hidden="true"></span>
                        <span class="visually-hidden">Siguiente</span>
                    </button>
